services:
  ctf-re:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: toolbox
    stdin_open: true
    tty: true
    environment:
      - ENABLE_GHIDRA_HEADLESS_MCP=1
    ports:
      - "8089:8089"   # ghidra-mcp headless HTTP
    volumes:
      - ./workspace:/workspace
      - ghidra-projects:/home/ctf/.config/ghidra
    cap_add:
      - SYS_PTRACE     # needed for gdb/strace/AFL-related debugging inside the container
    security_opt:
      - seccomp:unconfined

volumes:
  ghidra-projects: