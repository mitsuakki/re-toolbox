services:
  re-toolbox:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: toolbox
    stdin_open: true
    tty: true
    environment:
      - ENABLE_GHIDRA_HEADLESS_MCP=1
      - ENABLE_GATEWAY_HTTP=1
      - GATEWAY_HTTP_PORT=3100
      - GHIDRA_MCP_AUTH_TOKEN=re-toolbox-dev-secret
    ports:
      - "8089:8089"   # ghidra-mcp headless HTTP
      - "3100:3100"   # MCP gateway — StreamableHTTP
    volumes:
      - ./workspace:/workspace
      - ghidra-projects:/home/ctf/.config/ghidra
    cap_add:
      - SYS_PTRACE     # needed for gdb/strace/AFL-related debugging inside the container
    security_opt:
      - seccomp:unconfined

volumes:
  ghidra-projects: